name: CI/CD and GitHub Pages Deployment

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write
  deployments: write

# Allow one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  test-backend:
    name: Run Backend Pytest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install Python Dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-test.txt ]; then pip install -r requirements-test.txt; fi
          
      - name: Run Pytest (80 Backend API Tests)
        run: |
          cd backend
          pytest tests/

  load-test-backend:
    name: Run Backend Load Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install Python Dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-test.txt ]; then pip install -r requirements-test.txt; fi
          
      - name: Run Backend in Background
        run: |
          cd backend
          python app.py &
          sleep 5
          
      - name: Run Load Test (100 Users, 1 Minute)
        run: |
          cd backend
          python load_test.py
          
      - name: Upload Excel Artifact
        uses: actions/upload-artifact@v4
        with:
          name: load-test-results
          path: backend/load_test_results.xlsx

  run-e2e-security-tests:
    name: Run E2E & Security Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f appium-testing/requirements.txt ]; then pip install -r appium-testing/requirements.txt; fi
          pip install pandas openpyxl
          
      - name: Run E2E and Vulnerability Tests
        run: |
          cd appium-testing
          pytest test_mobile.py -v || true
          pytest test_web.py -v || true
          pytest test_security.py -v || true
          
      - name: Generate Frontend & Backend Test Excel Files
        run: |
          cd appium-testing
          python generate_test_excels.py
          
      - name: Upload Appium Test Artifact
        uses: actions/upload-artifact@v4
        with:
          name: 300-appium-test-cases
          path: 300_appium_test_cases.xlsx

      - name: Upload Selenium Test Artifact
        uses: actions/upload-artifact@v4
        with:
          name: 300-selenium-test-cases
          path: 300_selenium_test_cases.xlsx

      - name: Upload Backend Test Artifact
        uses: actions/upload-artifact@v4
        with:
          name: 300-backend-vulnerability-test-cases
          path: 300_backend_vulnerability_test_cases.xlsx

  build-and-deploy-frontend:
    name: Build & Deploy Flutter Web
    needs: test-backend
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
          
      - name: Install Flutter Dependencies
        run: |
          cd my_app
          flutter pub get
        
      - name: Build Flutter Web App
        # The base-href must match the repository name exactly for GitHub Pages to resolve assets correctly
        run: |
          cd my_app
          flutter build web --release --base-href /chatgpt/
        
      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4
        with:
          enablement: true
        
      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'my_app/build/web'
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
